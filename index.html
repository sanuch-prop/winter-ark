<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Winter Arc 90 — личный трекер</title>
  <style>
    /* ===== Тема/переменные ===== */
    :root{
      --bg:#0b0f17; --fg:#f2f5fa; --muted:#a6b0c3;
      --card:#151a26; --border:rgba(255,255,255,.08);
      --accent:#7dd3fc; --ok:#22c55e;
      --chip:#1c2436; --shadow:0 10px 24px rgba(0,0,0,.35);
    }

    /* ===== База и ЖЁСТКИЙ МОБ. ЗАМОК ===== */
    *{box-sizing:border-box; max-width:100%}
    html,body{height:100%}
    html, body { overflow-x:hidden; }
    body{
      margin:0; background:radial-gradient(1200px 900px at 15% 0%, #0f1726 0%, #0b0f17 60%);
      color:var(--fg);
      font:15px/1.42 system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;
      -webkit-text-size-adjust:100%;
    }
    .wrap{
      width:100vw; max-width:430px;   /* под iPhone 14 Pro Max */
      margin:0 auto; padding:12px;
    }
    header{position:sticky; top:0; z-index:10; margin-bottom:12px}
    .card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:12px; box-shadow:var(--shadow)}
    .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
    .row > *, header > * { min-width:0; } /* дети flex могут сжиматься */

    h1{font-size:18px; margin:0 0 6px}
    .sub{color:var(--muted); font-size:12px}
    .pill{background:linear-gradient(180deg,#172133,#121827);
      border:1px solid var(--border); border-radius:999px; padding:6px 10px; font-size:12px}
    .chips{display:flex; gap:6px; flex-wrap:wrap}
    .chip{background:var(--chip); border:1px solid var(--border); color:#cfe8ff; border-radius:999px; padding:4px 8px; font-size:11px}

    button,select{
      background:linear-gradient(180deg,#1c2436,#141c2b);
      color:var(--fg); border:1px solid var(--border);
      border-radius:10px; padding:8px 10px; font-size:14px; max-width:100%; cursor:pointer
    }

    /* ===== Календарь ===== */
    .legend{display:flex; gap:10px; color:var(--muted); font-size:12px; flex-wrap:wrap}
    .grid{display:grid; grid-template-columns:repeat(7, minmax(38px,1fr)); gap:6px}
    .dayCell{position:relative; min-height:58px; background:#121827; border:1px solid var(--border); border-radius:12px; padding:6px}
    .dayCell .num{font-weight:700; color:var(--muted); font-size:12px}
    .dayCell .pct{position:absolute; right:6px; top:6px; font-size:11px; color:var(--muted)}
    .dayCell.done{outline:2px solid var(--ok)}

    /* ===== День ===== */
    h2{margin:12px 0 8px; font-size:16px}
    ul{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px}
    li{display:flex; gap:10px; align-items:flex-start}
    input[type="checkbox"]{width:20px; height:20px; flex:0 0 auto; accent-color:#60a5fa}
    label, p, li, div { white-space:normal; overflow-wrap:anywhere; word-break:break-word }
    .group{border-left:3px solid rgba(125,211,252,.6); padding-left:10px; border-radius:6px}
    .hint{color:var(--muted); font-size:12px; margin-left:30px}

    /* ===== Прогресс ===== */
    .progressBar{height:10px; border:1px solid var(--border); background:rgba(255,255,255,.06); border-radius:999px; overflow:hidden}
    .progressBar>i{display:block; height:100%; background:linear-gradient(90deg,#7dd3fc,#c084fc)}

    /* ===== Футер ===== */
    .footer{margin:12px 0 20px; display:flex; gap:6px; flex-wrap:wrap}

    /* Медиаконтент не шире экрана */
    img,video,canvas,svg{max-width:100%; height:auto}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="card">
      <div class="row" style="justify-content:space-between; align-items:flex-start">
        <div style="min-width:0">
          <h1>Winter Arc 90 — личный офлайн-трекер</h1>
          <div class="sub">Старт: 1 октября 2025 · Прогресс проекта: <span id="projectPct">0%</span></div>
          <div class="progressBar" style="width:240px; margin-top:6px"><i id="projectBar" style="width:0%"></i></div>
        </div>
        <div class="row">
          <button id="btnCalendar">Календарь</button>
          <button id="btnToday">Сегодня</button>
          <select id="monthJump"></select>
        </div>
      </div>
    </header>

    <!-- Календарь -->
    <div id="viewCalendar" class="card">
      <div class="row" style="justify-content:space-between; margin-bottom:8px">
        <div>
          <strong id="calTitle" style="font-size:14px"></strong>
          <div class="legend">
            <span>зелёная рамка — день закрыт ≥ 95%</span>
            <span>цифра — % выполнено</span>
          </div>
        </div>
        <div class="row">
          <button id="prevMonth">◀</button><button id="nextMonth">▶</button>
        </div>
      </div>
      <div id="calGrid" class="grid"></div>
    </div>

    <!-- День -->
    <div id="viewDay" class="card" style="margin-top:12px; display:none"></div>

    <div class="footer">
      <button id="exportBtn">Экспорт (.json)</button>
      <input id="importInput" type="file" accept="application/json" style="display:none" />
      <button id="importBtn">Импорт</button>
      <button id="resetDay">Сбросить день</button>
      <button id="resetAll">Полный сброс</button>
      <span class="pill">План: <code>plan_90_days_ru.md</code> рядом с HTML</span>
    </div>
  </div>

<script>
(function(){
  const START_DATE = new Date('2025-10-01T00:00:00');
  const TOTAL_DAYS = 90;
  const STORAGE_KEY = 'winter_arc_90_progress_lock430_v1';

  // Фразы — как ты требовал, без изменений
  const morningBase = ['проснулся в 06:00','умылся и зубы почистил','собрался и сделал кофе','выпил таблетки и бады','тренировка на улице','вышел на улицу на тренировку'];
  const dayTasksBase = [
    'пришел с тренировки  и искупался в холодной воде',
    'покушал кашу с фруктами 100 гр. овсянки 100 гр. ягод',
    'сделал чай черный с бергамотом',
    'писать проект ! - Работа!',
    '( брат ты сильный )',
    'покушать гречку 300 гр вареного и филе 400 гр в сыром',
    'изменение голоса в ютубе 1 час',
    null // сюда вставим ПДД
  ];
  const eveningTail = [
    'пришел покушал творог 200 гр.',
    'Pocket Option - работа\n( сделай чай с бергамотом и лимоном и имбирем )',
    'купаться в холодной воде',
    'спать уложиться в кровать уже в 21:50'
  ];

  const $ = s => document.querySelector(s);
  const storage = {
    load(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch(_){return{}} },
    save(d){ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
  };
  let progress = storage.load();

  function fmtDate(d){ return d.toLocaleDateString('ru-RU',{year:'numeric',month:'long',day:'numeric'}) }
  function dayIndexFromDate(date){
    const ms = (new Date(date.getFullYear(),date.getMonth(),date.getDate()) - new Date(START_DATE.getFullYear(),START_DATE.getMonth(),START_DATE.getDate()));
    return Math.floor(ms/86400000) + 1;
  }
  function dateFromDayIndex(i){ const d=new Date(START_DATE); d.setDate(d.getDate()+(i-1)); return d; }

  // План тренировок из md
  let workouts = {};
  async function loadPlan(){
    try{
      const r = await fetch('plan_90_days_ru.md'); if(!r.ok) throw 0;
      const t = await r.text();
      const blocks = t.split(/\n---\n/g);
      blocks.forEach(b=>{
        const h = b.match(/\*\*День\s+(\d+)\s+—\s+([^*]+)\*\*/);
        if(!h) return;
        const idx = parseInt(h[1],10);
        const title = h[2].trim();
        const lines = b.split('\n').filter(l=>/^([•-])\s/.test(l)).map(l=> l.replace(/^([•-])\s*/,'').trim())
          .map(s=>{
            const m = s.split(/\s[—-]\s(.+)/);
            return {t:(m[0]||'').replace(/_/g,'').trim(), note:(m[1]||'').replace(/_/g,'').trim()};
          });
        workouts[idx] = {title, lines};
      });
    }catch(_){
      for(let i=1;i<=TOTAL_DAYS;i++) workouts[i] = {title:'', lines:[]};
    }
  }

  function pddRangeForDay(day){ const start=(day-1)*3+1; return `с ${start} - ${start+2} билет выучить пдд !`; }

  // Прогресс агрегация
  function gatherCounts(){
    let total=0, done=0;
    for(let i=1;i<=TOTAL_DAYS;i++){
      const st=progress['day_'+i];
      if(st){ const vals=Object.values(st); total+=vals.length; done+=vals.filter(Boolean).length; }
    }
    return {total,done,pct: total? Math.round(done/total*100):0};
  }
  function dayPct(i){
    const st=progress['day_'+i]; if(!st) return 0;
    const vals=Object.values(st); if(!vals.length) return 0;
    return Math.round(vals.filter(Boolean).length/vals.length*100);
  }

  // Рендер дня
  const viewDay = $('#viewDay'), viewCalendar = $('#viewCalendar');
  function checkboxHTML(dayKey,id,checked,text){ return `<li><input type="checkbox" data-key="${dayKey}" data-id="${id}" ${checked?'checked':''}/> <label>${text}</label></li>` }
  function subCheckboxHTML(dayKey,id,label,note,letter){
    const t = `${letter}. ${label}`; const checked = !!(progress[dayKey] && progress[dayKey][id]);
    return `<li style="margin-left:26px"><input type="checkbox" data-key="${dayKey}" data-id="${id}" ${checked?'checked':''}/> <label>${t}</label></li>` + (note? `<div class="hint">💡 ${note}</div>` : '');
  }

  function renderDay(dayIdx){
    const d = dateFromDayIndex(dayIdx);
    const w = workouts[dayIdx] || {title:'', lines:[]};
    const morningW = w.lines.slice(0,2), eveningW = w.lines.slice(2);

    const dayKey = 'day_'+dayIdx;
    const st = progress[dayKey] || {};
    let i=0; const next = ()=> (++i).toString();

    // Утро
    let morning = '<ul>';
    ['проснулся в 06:00','умылся и зубы почистил','собрался и сделал кофе','выпил таблетки и бады'].forEach(txt=>{
      morning += checkboxHTML(dayKey, next(), !!st[i], txt);
    });
    // Группа «утренняя тренировка» + подэтапы
    const grpMorningId = next(); morning += `<div class="group">${checkboxHTML(dayKey, grpMorningId, !!st[grpMorningId], 'Утренняя тренировка')}</div>`;
    const letters='АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩ'.split('');
    morningW.forEach((it,idx)=> morning += subCheckboxHTML(dayKey, next(), it.t, it.note, letters[idx]||'•'));
    ['тренировка на улице','вышел на улицу на тренировку'].forEach(txt=> morning += checkboxHTML(dayKey, next(), !!st[i], txt));
    morning += '</ul>';

    // День
    let day = '<ul>';
    dayTasksBase.forEach(txt=> day += checkboxHTML(dayKey, next(), !!st[i], (txt===null? pddRangeForDay(dayIdx):txt)));
    day += '</ul>';

    // Вечер
    let eve = '<ul>';
    const grpEveningId = next(); eve += `<div class="group">${checkboxHTML(dayKey, grpEveningId, !!st[grpEveningId], 'Вечерняя тренировка')}</div>`;
    eveningW.forEach((it,idx)=> eve += subCheckboxHTML(dayKey, next(), it.t, it.note, letters[idx]||'•'));
    eveningTail.forEach(txt=> eve += checkboxHTML(dayKey, next(), !!st[i], txt));
    eve += '</ul>';

    const pct = dayPct(dayIdx);
    const html =
    `<div class="row" style="justify-content:space-between; align-items:baseline">
       <div style="min-width:0">
         <h2 style="margin:0">${fmtDate(d)} — доброе утро паскуда ${dayIdx} день</h2>
         <div class="sub">${w.title? ('Тема: '+w.title) : 'Без темы'}</div>
         <div class="progressBar" style="width:200px; margin-top:6px"><i id="dayBar" style="width:${pct}%"></i></div>
       </div>
       <div class="chips"><span class="chip">TikTok</span><span class="chip">Winter Arc</span></div>
     </div>
     <div class="section"><h2>Утренняя рутина</h2>${morning}</div>
     <div class="section"><h2>Дневные задачи</h2>${day}</div>
     <div class="section"><h2>Вечерняя рутина</h2>${eve}</div>`;

    viewDay.innerHTML = html;
    viewCalendar.style.display = 'none';
    viewDay.style.display = '';

    viewDay.querySelectorAll('input[type="checkbox"]').forEach(el=>{
      el.addEventListener('change', ()=>{
        const key = el.getAttribute('data-key'); const id = el.getAttribute('data-id');
        const s = progress[key] || {}; s[id] = el.checked; progress[key]=s; storage.save(progress);
        renderCalendar(currentMonth, false); updateBars(dayIdx);
      });
    });
    updateBars(dayIdx);
  }

  function updateBars(dayIdx){
    const dPct = dayPct(dayIdx);
    const proj = gatherCounts();
    const bar = $('#dayBar'); if(bar) bar.style.width = dPct+'%';
    $('#projectBar').style.width = proj.pct+'%';
    $('#projectPct').textContent = proj.pct+'%';
  }

  // Календарь
  const calTitle = $('#calTitle'), calGrid = $('#calGrid'), monthJump = $('#monthJump');
  let currentMonth = new Date(START_DATE.getFullYear(), START_DATE.getMonth(), 1);

  function renderCalendar(monthDate, rebuildJump=true){
    calTitle.textContent = monthDate.toLocaleDateString('ru-RU',{month:'long',year:'numeric'});
    calGrid.innerHTML = '';
    const first = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
    const startWeekday = (first.getDay()+6)%7;
    const daysInMonth = new Date(monthDate.getFullYear(), monthDate.getMonth()+1, 0).getDate();

    for(let i=0;i<startWeekday;i++) calGrid.appendChild(document.createElement('div'));

    const endDate = new Date(START_DATE); endDate.setDate(START_DATE.getDate()+TOTAL_DAYS-1);
    for(let day=1; day<=daysInMonth; day++){
      const cell = document.createElement('div'); cell.className='dayCell';
      const cur = new Date(monthDate.getFullYear(), monthDate.getMonth(), day);
      const idx = dayIndexFromDate(cur);
      const within = cur>=START_DATE && cur<=endDate;
      cell.innerHTML = `<div class="num">${day}</div>`;
      if(within){
        const p = dayPct(idx);
        const badge = document.createElement('div'); badge.className='pct'; badge.textContent = p+'%';
        cell.appendChild(badge);
        if(p>=95) cell.classList.add('done');
        cell.style.cursor='pointer';
        cell.onclick = ()=> renderDay(idx);
      } else {
        cell.style.opacity=.35;
      }
      calGrid.appendChild(cell);
    }

    if(rebuildJump){
      monthJump.innerHTML='';
      const end2 = new Date(START_DATE); end2.setDate(START_DATE.getDate()+TOTAL_DAYS-1);
      for(let m=new Date(START_DATE.getFullYear(),START_DATE.getMonth(),1);
          m<=new Date(end2.getFullYear(),end2.getMonth(),1);
          m.setMonth(m.getMonth()+1)){
        const opt=document.createElement('option');
        opt.value=m.toISOString();
        opt.textContent=m.toLocaleDateString('ru-RU',{month:'long',year:'numeric'});
        if(m.getMonth()===monthDate.getMonth() && m.getFullYear()===monthDate.getFullYear()) opt.selected=true;
        monthJump.appendChild(opt);
      }
    }

    const proj = gatherCounts();
    $('#projectBar').style.width = proj.pct+'%';
    $('#projectPct').textContent = proj.pct+'%';
  }

  // Навигация/экспорт
  $('#prevMonth').onclick = ()=>{ currentMonth.setMonth(currentMonth.getMonth()-1); renderCalendar(currentMonth,false); };
  $('#nextMonth').onclick = ()=>{ currentMonth.setMonth(currentMonth.getMonth()+1); renderCalendar(currentMonth,false); };
  $('#btnCalendar').onclick = ()=>{ viewDay.style.display='none'; viewCalendar.style.display=''; };
  $('#btnToday').onclick = ()=>{ const idx=Math.max(1, Math.min(TOTAL_DAYS, dayIndexFromDate(new Date()))); renderDay(idx); };
  monthJump.onchange = e=>{ currentMonth = new Date(e.target.value); renderCalendar(currentMonth,false); };

  $('#exportBtn').onclick = ()=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([JSON.stringify(progress,null,2)],{type:'application/json'}));
    a.download='winter_arc_progress.json'; a.click();
  };
  $('#importBtn').onclick = ()=> $('#importInput').click();
  $('#importInput').onchange = async e=>{
    const f=e.target.files[0]; if(!f) return;
    try{ progress=JSON.parse(await f.text()); storage.save(progress); renderCalendar(currentMonth,false); alert('Импортирован прогресс'); }
    catch{ alert('Не удалось импортировать JSON'); }
  };
  $('#resetDay').onclick = ()=>{
    const idx=Math.max(1, Math.min(TOTAL_DAYS, dayIndexFromDate(new Date())));
    delete progress['day_'+idx]; storage.save(progress); renderDay(idx);
  };
  $('#resetAll').onclick = ()=>{
    if(confirm('Сбросить весь прогресс?')){ progress={}; storage.save(progress); renderCalendar(currentMonth,true); }
  };

  loadPlan().then(()=> renderCalendar(currentMonth,true));
})();
</script>
</body>
</html>
